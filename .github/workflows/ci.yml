name: Node.js CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # The Continuous Integration (CI) Job
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Run Tests
      run: npm test

  # The Continuous Deployment (CD) Job
  deploy:
    # IMPORTANT: This tells GitHub to ONLY run deployment if the tests pass!
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Simulate Deployment to Production
      run: |
        echo "🚀 Downloading final build artifact..."
        echo "🔒 Authenticating with production server..."
        echo "✅ Uploading files to server..."
        echo "🎉 Deployment successful! App is now live."
